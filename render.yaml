services:
  - type: web
    name: botieuchi-api
    runtime: python
    region: singapore
    plan: free
    rootDir: khaosat-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: botieuchi-62fbb
      - key: FIREBASE_STORAGE_BUCKET
        value: botieuchi-62fbb.appspot.com
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
